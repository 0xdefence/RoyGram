<!DOCTYPE html>
<html>

<head>
    <title>InstaClone</title>
    <script src="https://kit.fontawesome.com/3c9655bbec.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class ="app">

    <div class ='title'>
    <h1>RoyGram</h1>
    <div class='input-search-bar'>
        <p>Search For</p>
    </div>
        <div class ="buttons-on-top">
            <i class="fa fa-file-photo-o"></i>
            <i class="fa-solid fa-heart"></i>
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </div>

    <div class ='stories'>
        <div class="user-story">
        <img class="otheruser-pfp"
            src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0"></img>
        <p>Your Story</p>
        </div>
        <div class="user-story">
        <img class="otheruser-pfp"
            src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0"></img>
        <p>jack</p>
        </div>
        <div class="user-story">
        <img class="otheruser-pfp"
            src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0"></img>
        <p>bobby</p>
        </div>
        <div class="user-story">
        <img class="otheruser-pfp"
            src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0"></img>
        <p>loony</p>
        </div>
    </div>

    

    <div class="post">
        <div class="posting-header">
            <img class="user-poster"
            src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0"></img>
            <div class="poster-name">
                <p>@OGDOGE</p>
                </div>
        </div>

        <img class="posted-image"
            src="https://upload.wikimedia.org/wikipedia/commons/f/f6/Full_cycle_of_a_Sunset_on_the_high_plains_of_the_Mojave_Desert.jpg"></img>
    <div class ="buttons">
        <i class="fa-solid fa-heart"></i>
        <i class="fa-solid fa-comment"></i>
        <i class="fa-solid fa-paper-plane"></i>
    </div>
    
    <div class="poster-row">
        <div class="poster">
            <div class="poster-comment">
                <p>wen headpat and bone</p>
            </div>
        </div>
        </div>
    </div>

    <div class="comment-section-bundle">
        <div class="comment-header">
        <h2>Comment section</h2>
        </div>
        <div class="comment">
            <div class="username-logo">
                <img class="user-poster"
                src="https://fastly.picsum.photos/id/237/536/354.jpg?hmac=i0yVXW1ORpyCZpQ-CknuyV-jbtU7_x9EBQVhvT5aRr0">
                </img>
            </div>
            <div class = "poster">
                <div class = "poster-name">
                    <p>@goodboy</p>
                </div> 
                <div class="poster-comment">
                <p>Love it!</p>
                </div>
            </div>
        </div>
        <div class="add-comment">
            <i class="fa-solid fa-comment"></i>
            <p>Add your own comment button</p>
            </div>
    </div>
</main>
</body>

</html>
